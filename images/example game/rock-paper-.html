<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 25px; padding: 40px 30px; box-shadow: 0 25px 70px rgba(0, 0, 0, 0.25); max-width: 600px; width: 100%; }
        h1 { text-align: center; background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; font-size: 2.5rem; }
        .subtitle { text-align: center; color: #888; margin-bottom: 25px; font-size: 0.9rem; }
        .score-board { display: flex; justify-content: space-around; margin-bottom: 30px; padding: 20px; background: linear-gradient(135deg, #fff5f7 0%, #fffef5 100%); border-radius: 15px; }
        .score { text-align: center; }
        .score-label { font-size: 0.85rem; color: #666; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .score-value { font-size: 2rem; font-weight: bold; }
        .score-value.you { color: #fa709a; }
        .score-value.comp { color: #f59e0b; }
        .score-value.draw { color: #999; }
        .battle-arena { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 20px; margin-bottom: 25px; padding: 20px; background: #f8f9fa; border-radius: 15px; min-height: 150px; }
        .fighter { text-align: center; }
        .fighter-label { font-size: 0.9rem; font-weight: 600; color: #666; margin-bottom: 10px; }
        .fighter-icon { font-size: 4rem; min-height: 80px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .fighter-icon.shake { animation: shake 0.5s ease; }
        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }
        .vs { font-size: 1.5rem; font-weight: bold; color: #fa709a; }
        .result { text-align: center; font-size: 1.3rem; font-weight: 600; min-height: 35px; margin-bottom: 25px; color: #333; }
        .result.win { color: #22c55e; }
        .result.lose { color: #ef4444; }
        .result.draw { color: #f59e0b; }
        .choices-label { text-align: center; color: #666; margin-bottom: 15px; font-size: 0.9rem; }
        .choices { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .choice-btn { background: white; border: 3px solid transparent; border-radius: 15px; padding: 20px 10px; cursor: pointer; transition: all 0.3s ease; font-size: 3rem; display: flex; flex-direction: column; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08); }
        .choice-btn:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(250, 112, 154, 0.3); border-color: #fa709a; }
        .choice-btn:active { transform: translateY(-2px); }
        .choice-label { font-size: 0.85rem; font-weight: 600; color: #666; }
        .btn-reset { display: block; width: 100%; padding: 12px; background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
        .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(250, 112, 154, 0.4); }
        @media (max-width: 480px) { h1 { font-size: 2rem; } .fighter-icon { font-size: 3rem; } .choice-btn { font-size: 2.5rem; padding: 15px 5px; } .container { padding: 25px 18px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>✊ ✋ ✌️</h1>
        <div class="subtitle">Rock Paper Scissors 2026</div>
        <div class="score-board">
            <div class="score"><div class="score-label">Aap</div><div class="score-value you" id="youScore">0</div></div>
            <div class="score"><div class="score-label">Draw</div><div class="score-value draw" id="drawScore">0</div></div>
            <div class="score"><div class="score-label">Computer</div><div class="score-value comp" id="compScore">0</div></div>
        </div>
        <div class="battle-arena">
            <div class="fighter"><div class="fighter-label">AAP</div><div class="fighter-icon" id="youIcon">❓</div></div>
            <div class="vs">VS</div>
            <div class="fighter"><div class="fighter-label">COMPUTER</div><div class="fighter-icon" id="compIcon">❓</div></div>
        </div>
        <div class="result" id="result">Apna chunav karein!</div>
        <div class="choices-label">👇 Neeche click karein</div>
        <div class="choices">
            <button class="choice-btn" onclick="play('rock')"><span>✊</span><span class="choice-label">Patthar</span></button>
            <button class="choice-btn" onclick="play('paper')"><span>✋</span><span class="choice-label">Kagaz</span></button>
            <button class="choice-btn" onclick="play('scissors')"><span>✌️</span><span class="choice-label">Kainchi</span></button>
        </div>
        <button class="btn-reset" onclick="resetScores()">Score Reset</button>
    </div>
    <script>
        const icons={rock:'✊',paper:'✋',scissors:'✌️'};
        const choices=['rock','paper','scissors'];
        let scores={you:0,comp:0,draw:0};
        const youIcon=document.getElementById('youIcon'),compIcon=document.getElementById('compIcon');
        const resultEl=document.getElementById('result');
        const youScoreEl=document.getElementById('youScore'),compScoreEl=document.getElementById('compScore'),drawScoreEl=document.getElementById('drawScore');
        function getComputerChoice(){return choices[Math.floor(Math.random()*3)];}
        function getResult(p,c){if(p===c)return'draw';if((p==='rock'&&c==='scissors')||(p==='paper'&&c==='rock')||(p==='scissors'&&c==='paper'))return'win';return'lose';}
        function play(choice){
            youIcon.classList.remove('shake');compIcon.classList.remove('shake');void youIcon.offsetWidth;
            youIcon.textContent='✊';compIcon.textContent='✊';
            youIcon.classList.add('shake');compIcon.classList.add('shake');
            setTimeout(()=>{
                const compChoice=getComputerChoice();
                youIcon.textContent=icons[choice];compIcon.textContent=icons[compChoice];
                const result=getResult(choice,compChoice);
                resultEl.className='result '+result;
                if(result==='win'){scores.you++;resultEl.textContent=`🎉 Aap jeet gaye! ${cap(choice)} beats ${cap(compChoice)}`;}
                else if(result==='lose'){scores.comp++;resultEl.textContent=`😢 Aap haar gaye! ${cap(compChoice)} beats ${cap(choice)}`;}
                else{scores.draw++;resultEl.textContent=`🤝 Draw! Dono ne ${cap(choice)} chuna`;}
                updateScores();
            },500);
        }
        function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
        function updateScores(){youScoreEl.textContent=scores.you;compScoreEl.textContent=scores.comp;drawScoreEl.textContent=scores.draw;}
        function resetScores(){scores={you:0,comp:0,draw:0};updateScores();youIcon.textContent='❓';compIcon.textContent='❓';resultEl.className='result';resultEl.textContent='Apna chunav karein!';}
    </script>
</body>
</html>
