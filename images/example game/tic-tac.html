<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); max-width: 500px; width: 100%; }
        h1 { text-align: center; color: #667eea; margin-bottom: 10px; font-size: 2.5rem; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 0.9rem; }
        .score-board { display: flex; justify-content: space-around; margin-bottom: 30px; padding: 20px; background: #f8f9fa; border-radius: 15px; }
        .score { text-align: center; }
        .score-label { font-size: 0.9rem; color: #666; margin-bottom: 5px; }
        .score-value { font-size: 2rem; font-weight: bold; color: #667eea; }
        .status { text-align: center; font-size: 1.3rem; margin-bottom: 20px; color: #333; min-height: 40px; font-weight: 600; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; aspect-ratio: 1; }
        .cell { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 15px; font-size: 3rem; font-weight: bold; color: white; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3); }
        .cell:hover:not(.taken) { transform: scale(1.05); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5); }
        .cell.taken { cursor: not-allowed; }
        .cell.x { color: #fff; animation: pop 0.3s ease; }
        .cell.o { color: #ffd700; animation: pop 0.3s ease; }
        @keyframes pop { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .cell.winner { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); animation: pulse 0.5s ease infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .controls { display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 12px 30px; font-size: 1rem; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5); }
        .btn-secondary { background: #f8f9fa; color: #667eea; border: 2px solid #667eea; }
        .btn-secondary:hover { background: #667eea; color: white; }
        @media (max-width: 480px) { h1 { font-size: 2rem; } .cell { font-size: 2rem; } .container { padding: 20px; } .score-value { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Tic-Tac-Toe</h1>
        <div class="subtitle">2026 Edition - Multiplayer Ready</div>
        <div class="score-board">
            <div class="score"><div class="score-label">Player X</div><div class="score-value" id="scoreX">0</div></div>
            <div class="score"><div class="score-label">Draws</div><div class="score-value" id="scoreDraw">0</div></div>
            <div class="score"><div class="score-label">Player O</div><div class="score-value" id="scoreO">0</div></div>
        </div>
        <div class="status" id="status">Player X ki baari</div>
        <div class="board" id="board">
            <button class="cell" data-index="0"></button><button class="cell" data-index="1"></button><button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button><button class="cell" data-index="4"></button><button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button><button class="cell" data-index="7"></button><button class="cell" data-index="8"></button>
        </div>
        <div class="controls">
            <button class="btn btn-primary" onclick="resetGame()">Naya Game</button>
            <button class="btn btn-secondary" onclick="resetAll()">Score Reset</button>
        </div>
    </div>
    <script>
        let currentPlayer='X',gameBoard=Array(9).fill(''),gameActive=true,scores={X:0,O:0,draw:0};
        const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        const cells=document.querySelectorAll('.cell'),statusEl=document.getElementById('status');
        const scoreXEl=document.getElementById('scoreX'),scoreOEl=document.getElementById('scoreO'),scoreDrawEl=document.getElementById('scoreDraw');
        cells.forEach(c=>c.addEventListener('click',e=>{
            const i=+c.dataset.index;if(gameBoard[i]||!gameActive)return;
            gameBoard[i]=currentPlayer;c.textContent=currentPlayer;c.classList.add('taken',currentPlayer.toLowerCase());check();
        }));
        function check(){
            for(const[a,b,c]of wins)if(gameBoard[a]&&gameBoard[a]===gameBoard[b]&&gameBoard[a]===gameBoard[c]){
                statusEl.textContent=`🎉 Player ${currentPlayer} jeet gaya!`;gameActive=false;scores[currentPlayer]++;update();
                [a,b,c].forEach(i=>cells[i].classList.add('winner'));return;
            }
            if(!gameBoard.includes('')){statusEl.textContent='🤝 Match draw!';gameActive=false;scores.draw++;update();return;}
            currentPlayer=currentPlayer==='X'?'O':'X';statusEl.textContent=`Player ${currentPlayer} ki baari`;
        }
        function update(){scoreXEl.textContent=scores.X;scoreOEl.textContent=scores.O;scoreDrawEl.textContent=scores.draw;}
        function resetGame(){currentPlayer='X';gameBoard=Array(9).fill('');gameActive=true;statusEl.textContent='Player X ki baari';
            cells.forEach(c=>{c.textContent='';c.classList.remove('taken','x','o','winner');});}
        function resetAll(){scores={X:0,O:0,draw:0};update();resetGame();}
    </script>
</body>
</html>
